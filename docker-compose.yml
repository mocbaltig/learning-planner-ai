version: "3.8"

services:
  db:
    image: postgres:16
    env_file: .env # Reads from the unified .env dropped by GitHub Actions
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolu -d planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/${IMAGE_NAME}-server:latest
    container_name: web_server_prod
    env_file: .env # Reads from the unified .env dropped by GitHub Actions
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

  client:
    image: ghcr.io/${IMAGE_NAME}-client:latest
    container_name: web_client_prod
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - server

volumes:
  pgdata:
