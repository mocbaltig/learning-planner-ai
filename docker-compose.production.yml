services:
  db:
    image: postgres:16
    env_file: ./server/.env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d planner']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.production
    env_file: ./server/.env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.production
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  pgdata:
