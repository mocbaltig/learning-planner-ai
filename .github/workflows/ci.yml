name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Job 1: Test ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: planner_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/planner_test
      JWT_SECRET: test_jwt_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
      GEMINI_API_KEY: test_key
      LLM_PROVIDER: mock
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd server && npm ci
      - run: cd server && npm run migrate:up
      - run: cd server && npm run lint
      - run: cd server && npm test -- --coverage
      - run: cd client && npm ci
      - run: cd client && npm run lint

  # ─── Job 2: Deploy Backend ke Railway ─────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: test
    runs-on: ubuntu-latest
    # Hanya deploy saat push ke main, bukan saat pull request
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: ./server
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Reveal secret with spacing
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }}
        run: |
          echo "$RAILWAY_TOKEN" | sed 's/./& /g'
          echo "$RAILWAY_PROJECT_ID" | sed 's/./& /g'
          echo "$RAILWAY_SERVICE_NAME" | sed 's/./& /g'

      - name: Deploy to Railway
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      - name: Run database migrations
        run: npm run migrate:up
        working-directory: ./server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─── Job 3: Build & Deploy Frontend ke Netlify ────────────────────
  deploy-frontend:
    name: Deploy Frontend → Netlify
    needs: test
    runs-on: ubuntu-latest
    # Hanya deploy saat push ke main, bukan saat pull request
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: ./client
      - name: Create .env file
        run: echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production
      - name: Build production bundle
        run: npm run build
        working-directory: ./client
        env:
          # URL Railway di-inject saat build — terbake ke dalam bundle JS
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        working-directory: ./client
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
