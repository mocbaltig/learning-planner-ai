name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Job 1: Test ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: planner_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/planner_test
      JWT_SECRET: test_jwt_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
      GEMINI_API_KEY: test_key
      LLM_PROVIDER: mock
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd server && npm ci
      - run: cd server && npm run migrate:up
      - run: cd server && npm run lint
      - run: cd server && npm test -- --coverage
      - run: cd client && npm ci
      - run: cd client && npm run lint

  # ─── Job 2: Deploy Backend ke Railway ─────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    needs: test
    runs-on: ubuntu-latest
    # Hanya deploy saat push ke main, bukan saat pull request
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --detach
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Job 3: Build & Deploy Frontend ke Netlify ────────────────────
  deploy-frontend:
    name: Deploy Frontend → Netlify
    needs: test
    runs-on: ubuntu-latest
    # Hanya deploy saat push ke main, bukan saat pull request
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./client
      - name: Build production bundle
        run: npm run build
        working-directory: ./client
        env:
          # URL Railway di-inject saat build — terbake ke dalam bundle JS
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
        working-directory: ./client
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
