name: Production Build and Deploy Monolith

on:
  push:
    branches:
      - production

# Strict global permissions fallback
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-changes:
    name: Check Modified Directories
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.ref }}
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  build-client:
    name: Build Client Image (GitHub Hosted)
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata (Tags, Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-client
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.sha }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # Tuned to min for production-optimized frontend assets
          cache-to: type=gha,mode=min

      - name: Clean up old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: "learning-planner-ai-client"
          package-type: "container"
          min-versions-to-keep: 5
          delete-only-untagged-versions: "true"

  build-server:
    name: Build Server Image (GitHub Hosted)
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata (Tags, Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.sha }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: "learning-planner-ai-server"
          package-type: "container"
          min-versions-to-keep: 5
          delete-only-untagged-versions: "true"

  deploy:
    name: Deploy Package (NAT VPS Self-Hosted)
    needs: [detect-changes, build-client, build-server]
    if: |
      always() &&
      (needs.detect-changes.outputs.client == 'true' || needs.detect-changes.outputs.server == 'true') &&
      (needs.build-client.result == 'success' || needs.build-client.result == 'skipped') &&
      (needs.build-server.result == 'success' || needs.build-server.result == 'skipped')
    runs-on: self-hosted
    steps:
      - name: Checkout Configuration Files
        uses: actions/checkout@v4

      - name: Prepare Workspace Directories
        run: |
          mkdir -p ~/app

      - name: Inject Production Environment Secrets
        run: |
          echo "${{ secrets.PROD_ENV }}" > ~/app/.env

      - name: Sync Orchestration Configuration
        run: |
          cp docker-compose.yml ~/app/docker-compose.yml

      - name: Authenticate Local Docker to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Images and Spin Up Containers
        run: |
          cd ~/app
          # Quiet download reduces log sizes and network overhead
          docker compose pull --quiet
          docker compose up -d

      - name: Prune Stale Docker Assets
        run: |
          docker image prune -f
